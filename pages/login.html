<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log In</title>
  <link href="../styles/book-style.css" rel="stylesheet">

</head>


<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-sm navbar-dark sticky-top p-0">
    <div class="container-fluid flex-column align-items-stretch px-0">

      <!-- bookbot! title & nav titles -->
      <div class="w-100 px-3 py-2 d-flex align-items-center">
        <a class="navbar-brand fw-bold mb-0" href="../index.html">bookbot!</a>

        <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-sm-0">
            <li class="nav-item"><a class="nav-link" href="../pages/about.html">about</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <!-- nav "bar" -->
  <div class="container row justify-content-md-center ">
    <div class="col-md-8">
      <a href="../index.html" btn btn-link p-0 text-secondary float-left aria-label="Back">
        <i class="bi bi-arrow-left fs-2"></i>
      </a>
      <br>
      <span class="title fs-3">Enter your details</span>
    </div>
  </div>


  <!-- login "form" -->
  <div class="row justify-content-center">
    <div class="col-md-8">

      <input id="username" type="text" class="form-control p-2 fs-4 mb-2" placeholder="user name">



      <div class="input-group">
        <input type="password" id="password" class="form-control p-2 fs-4 border-end-0"
          placeholder="password (hint: it's still lasagna)">
        <button class="btn border border-rounded border-start-0" type="button" id="togglePassword"
          aria-label="Toggle password visibility">
          <i class="bi bi-eye-slash fs-4"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="row mt-4 justify-content-center">
    <div class="col-md-8">
      <button id="login-button" class="btn btn-lg bg-white w-100 fs-5 p-3 border border-rounded-pill" type="button"
        aria-label="Sign In">Sign In to BookBot!
      </button>
    </div>
  </div>

  <!-- oAuth2 buttons -->

  <div class="row mb-3 justify-content-center">
    <div class="col-md-8">
      <div class="p-3 text-muted fw-bold">forgot password
      </div>
    </div>
    <div class="col-md-8">
      <button class="btn border border-2 rounded-pill p-3 text-muted bg-white w-100 fw-bold text-uppercase"
        type="button" disabled>
        <i class="bi bi-google social-icon"></i>
        SIGN IN WITH GOOGLE
      </button>
    </div>
    <div class="col-md-8">
      <button class="btn border border-2 rounded-pill p-3 text-muted bg-white w-100 fw-bold text-uppercase mt-2"
        type="button" disabled>
        <i class="bi bi-github social-icon"></i>
        SIGN IN WITH GITHUB
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="row justify-content-center">
    <div class="col-md-8 mb-3">
      <span class="text-muted">®️2026 BookBot</span>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../scripts/login-script.js"></script>

</body>

</html>
